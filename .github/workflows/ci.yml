name: CI

# 质量门禁：每次 PR 与推送到 main 都跑格式检查 + 静态分析 + 测试。
# 发版构建（打 tag 出 APK）在 flutter.yml，两者分离。
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
